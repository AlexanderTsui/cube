model:
  base_config_path: "cube3d/configs/open_model_v0.5.yaml"
  gpt_ckpt_path: "model_weights/shape_gpt.safetensors"
  shape_ckpt_path: "model_weights/shape_tokenizer.safetensors"

runtime:
  device: "auto"
  distributed: true
  seed: 42
  output_dir: "/root/autodl-tmp/block_diffusion_train"

data:
  manifest_path: "/root/autodl-tmp/bdcube_dataset/manifests/pairs_bdcube.jsonl"
  val_ratio: 0.2
  seed: 42

diffusion:
  block_size: 32
  num_steps: 8
  eps_min: 0.001
  eps_max: 1.0
  antithetic_sampling: true
  resample: false
  var_min: true
  clip_search_delta: 0.05
  clip_search_widths: [0.5, 0.6, 0.7, 0.8, 0.9]
  fix_clipping: false
  cfg_drop_prob: 0.1
  first_hitting: false

train:
  batch_size: 1
  micro_batch_size_per_gpu: 1
  grad_accum_steps: 8
  num_workers: 0
  lr: 1.0e-4
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.01
  optimizer: "adamw_zero"
  grad_checkpoint: true
  grad_clip: 1.0
  amp_dtype: "bfloat16"
  max_steps: 5000
  log_every: 20
  eval_every: 100
  val_max_batches: 20
  val_var_batches: 20
  save_every: 500

logging:
  tensorboard: true
  tb_log_dir: "/root/autodl-tmp/block_diffusion_train/tb"
